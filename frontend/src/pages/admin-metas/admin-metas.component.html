<div class="admin-metas">

  <!-- Header -->
  <div class="page-header">
    <h2>Gestión de Metas</h2>
    <p>Configura las metas por comportamiento vial, municipio y tipo de vehículo.</p>
  </div>

  <!-- Filtros -->
  <div class="filters-card">
    <div class="filters">
      <div class="field">
        <label>Departamento</label>
        <select [(ngModel)]="departamentoSeleccionado" (change)="onDepartamentoChange()">
          <option value="">Seleccione...</option>
          <option *ngFor="let d of departamentos" [value]="d">{{ d }}</option>
        </select>
      </div>

      <div class="field">
        <label>Municipio</label>
        <select
          [(ngModel)]="municipioSeleccionadoId"
          (change)="onMunicipioChange()"
          [disabled]="!departamentoSeleccionado"
        >
          <option value="">Seleccione...</option>
          <option *ngFor="let m of municipios" [ngValue]="m.id">{{ m.nombre }}</option>
        </select>
      </div>

      <button
        class="btn-save"
        (click)="saveChanges()"
        [disabled]="saving || !hasChanges()"
      >
        {{ saving ? '⏳ Guardando...' : '💾 Guardar cambios' }}
      </button>
    </div>
  </div>

  <!-- Alertas -->
  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="alert alert-success" *ngIf="success">
    <span class="alert-icon">✅</span>
    {{ success }}
  </div>

  <!-- Loading -->
  <div class="loading-state" *ngIf="loadingCatalogo || loadingMetas">
    <div class="spinner"></div>
    Cargando información...
  </div>

  <!-- Tabla -->
  <div class="table-wrap" *ngIf="municipioSeleccionadoId && !loadingMetas">
    <table>
      <thead>
        <tr>
          <th>Comportamiento vial</th>
          <th *ngFor="let v of vehicleColumns">{{ v }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let behavior of behaviors">
          <td class="behavior">{{ labelFor(behavior) }}</td>
          <td *ngFor="let v of vehicleColumns">
            <div
              class="cell"
              [class.no-aplica]="getCell(behavior, v).disabled"
              [class.inactive]="!getCell(behavior, v).activo && !getCell(behavior, v).disabled"
            >
              <ng-container *ngIf="!getCell(behavior, v).disabled; else noAplicaTpl">
                <input
                  type="number"
                  [ngModel]="getCell(behavior, v).meta"
                  (ngModelChange)="onMetaChange(behavior, v, $event)"
                  min="0"
                />
                <label class="toggle">
                  <input
                    type="checkbox"
                    [checked]="getCell(behavior, v).activo"
                    (change)="onActivoChange(behavior, v, !!$any($event.target).checked)"
                  />
                  Activo
                </label>
              </ng-container>
              <ng-template #noAplicaTpl>
                <span class="na">N/A</span>
              </ng-template>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!municipioSeleccionadoId && !loadingMetas && !loadingCatalogo">
    <div class="empty-icon">🗺️</div>
    Selecciona un departamento y municipio para cargar y editar las metas.
  </div>

</div>
