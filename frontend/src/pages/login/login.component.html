<div class="auth">
  <div class="card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Accede al panel de Seguridad Vial</p>

    <form (ngSubmit)="login()" #f="ngForm">
      <label>
        Usuario
        <input name="username" [(ngModel)]="username" required />
      </label>

      <label>
        Contraseña
        <input name="password" [(ngModel)]="password" type="password" required />
      </label>

      <button class="btn" [disabled]="f.invalid || loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>

      <div class="error" *ngIf="error">{{ error }}</div>
    </form>
  </div>
</div>
