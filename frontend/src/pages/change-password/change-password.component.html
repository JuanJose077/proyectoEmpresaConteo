<div class="auth-shell">

  <div class="form-card">

    <!-- Icono de cabecera -->
    <div class="card-icon">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="12" fill="var(--indigo-dim)"/>
        <rect x="12" y="20" width="16" height="13" rx="3" stroke="var(--indigo)" stroke-width="1.8"/>
        <path d="M15 20V15.5a5 5 0 0110 0V20" stroke="var(--indigo)" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="20" cy="26.5" r="2" fill="var(--indigo)"/>
        <!-- Flecha de renovación -->
        <path d="M26 10 Q30 10 30 14" stroke="var(--indigo-light)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <polygon points="30,11 30,15 27,13" fill="var(--indigo-light)"/>
      </svg>
    </div>

    <div class="form-header">
      <h1>Cambiar contraseña</h1>
      <p class="form-subtitle">Debes actualizar tu contraseña antes de continuar.</p>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm" novalidate>

      <!-- Contraseña actual -->
      <div class="field" [class.field-error]="curCtrl.invalid && curCtrl.touched">
        <label for="currentPassword">Contraseña actual</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="13.5" r="1.5" fill="currentColor"/>
          </svg>
          <input
            id="currentPassword"
            name="currentPassword"
            [type]="showCurrent ? 'text' : 'password'"
            [(ngModel)]="currentPassword"
            #curCtrl="ngModel"
            required
            placeholder="••••••••"
            [disabled]="loading"
          />
          <button type="button" class="eye-btn" (click)="showCurrent = !showCurrent">
            <svg *ngIf="!showCurrent" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg *ngIf="showCurrent"  viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M12.5 12.5A3 3 0 017.5 7.5M5.5 5.5C3.8 6.9 2 10 2 10s3 6 8 6c1.5 0 2.9-.4 4-1.1M8 4.2C8.6 4.1 9.3 4 10 4c5 0 8 6 8 6s-.8 1.6-2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="field-hint" *ngIf="curCtrl.invalid && curCtrl.touched">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>La contraseña actual es obligatoria.</span>
        </div>
      </div>

      <!-- Nueva contraseña -->
      <div class="field" [class.field-error]="newCtrl.invalid && newCtrl.touched">
        <label for="newPassword">Nueva contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="13.5" r="1.5" fill="currentColor"/>
          </svg>
          <input
            id="newPassword"
            name="newPassword"
            [type]="showNew ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            #newCtrl="ngModel"
            required
            minlength="8"
            placeholder="Mínimo 8 caracteres"
            [disabled]="loading"
          />
          <button type="button" class="eye-btn" (click)="showNew = !showNew">
            <svg *ngIf="!showNew" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg *ngIf="showNew"  viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M12.5 12.5A3 3 0 017.5 7.5M5.5 5.5C3.8 6.9 2 10 2 10s3 6 8 6c1.5 0 2.9-.4 4-1.1M8 4.2C8.6 4.1 9.3 4 10 4c5 0 8 6 8 6s-.8 1.6-2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>

        <!-- Indicador de fortaleza -->
        <div class="strength-bar" *ngIf="newPassword.length > 0">
          <div class="strength-segments">
            <div class="seg" [class.active]="strength >= 1" [class.weak]="strength === 1" [class.medium]="strength === 2" [class.strong]="strength >= 3"></div>
            <div class="seg" [class.active]="strength >= 2" [class.medium]="strength === 2" [class.strong]="strength >= 3"></div>
            <div class="seg" [class.active]="strength >= 3" [class.strong]="strength >= 3"></div>
            <div class="seg" [class.active]="strength >= 4" [class.strong]="strength >= 4"></div>
          </div>
          <span class="strength-label" [class.weak]="strength === 1" [class.medium]="strength === 2" [class.strong]="strength >= 3">
            {{ strengthLabel }}
          </span>
        </div>

        <div class="field-hint" *ngIf="newCtrl.invalid && newCtrl.touched">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span *ngIf="newCtrl.errors?.['required']">La nueva contraseña es obligatoria.</span>
          <span *ngIf="newCtrl.errors?.['minlength']">Debe tener al menos 8 caracteres.</span>
        </div>
      </div>

      <!-- Confirmar contraseña -->
      <div class="field"
           [class.field-error]="confCtrl.touched && (confCtrl.invalid || (confirmPassword && newPassword !== confirmPassword))"
           [class.field-success]="confCtrl.touched && confCtrl.valid && confirmPassword && newPassword === confirmPassword">
        <label for="confirmPassword">Confirmar nueva contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="10" cy="13.5" r="1.5" fill="currentColor"/>
          </svg>
          <input
            id="confirmPassword"
            name="confirmPassword"
            [type]="showConfirm ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            #confCtrl="ngModel"
            required
            placeholder="Repite la nueva contraseña"
            [disabled]="loading"
          />
          <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm">
            <svg *ngIf="!showConfirm" viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            <svg *ngIf="showConfirm"  viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M12.5 12.5A3 3 0 017.5 7.5M5.5 5.5C3.8 6.9 2 10 2 10s3 6 8 6c1.5 0 2.9-.4 4-1.1M8 4.2C8.6 4.1 9.3 4 10 4c5 0 8 6 8 6s-.8 1.6-2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="field-hint" *ngIf="confCtrl.touched && confirmPassword && newPassword !== confirmPassword">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Las contraseñas no coinciden.</span>
        </div>
        <div class="field-hint success" *ngIf="confCtrl.touched && confirmPassword && newPassword === confirmPassword && newPassword.length > 0">
          <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Las contraseñas coinciden.</span>
        </div>
      </div>

      <!-- Error de servidor -->
      <div class="server-error" *ngIf="error" role="alert">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 6.5V10.5M10 13.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div>
          <strong>No se pudo actualizar</strong>
          <span>{{ error }}</span>
        </div>
      </div>

      <!-- Botón -->
      <button
        class="btn-submit"
        type="submit"
        [disabled]="f.invalid || loading || newPassword !== confirmPassword"
      >
        <span class="btn-spinner" *ngIf="loading">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/><path d="M12 3a9 9 0 019 9" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
        </span>
        <span>{{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}</span>
      </button>

    </form>
  </div>

</div>
