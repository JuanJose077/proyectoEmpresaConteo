<div class="auth">
  <div class="card">
    <h1>Cambiar contraseńa</h1>
    <p class="subtitle">Debes actualizar tu contraseńa para continuar</p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <label>
        Contraseńa actual
        <input name="currentPassword" [(ngModel)]="currentPassword" type="password" required />
      </label>

      <label>
        Nueva contraseńa
        <input name="newPassword" [(ngModel)]="newPassword" type="password" required />
      </label>

      <label>
        Confirmar nueva contraseńa
        <input name="confirmPassword" [(ngModel)]="confirmPassword" type="password" required />
      </label>

      <button class="btn" [disabled]="f.invalid || loading">
        {{ loading ? 'Actualizando...' : 'Actualizar contraseńa' }}
      </button>

      <div class="error" *ngIf="error">{{ error }}</div>
    </form>
  </div>
</div>
